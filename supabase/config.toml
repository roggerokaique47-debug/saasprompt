[project]
name = "prompthub"
plan = "free"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.vercel.app"]
jwt_expiry = 3600
email_confirmation_required = false

[auth.external.google]
enabled = true
client_id = ""
secret = ""

[analytics]
enabled = false

[storage]
enabled = true

[functions.process-workflow]
enabled = true
verify_jwt = false
import_map = "./functions/process-workflow/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/process-workflow/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/process-workflow/*.html" ]
